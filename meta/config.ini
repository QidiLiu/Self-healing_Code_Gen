[model]
; provider/model format, e.g. deepseek/deepseek-v4-pro
provider_model = deepseek/deepseek-v4-pro
; API key (leave empty to use env var or key file)
api_key =
; Custom API base URL (optional)
base_url =
max_retries = 4
max_replans = 2

[email]
; Set to true to enable email notifications
enabled = false
; Recipient email address for notifications
recipient =
; Progress report interval in minutes (0 = disabled)
progress_interval_minutes = 30
